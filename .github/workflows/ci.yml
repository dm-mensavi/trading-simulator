name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: User Service ─────────────────────────────────────
  test-user-service:
    name: Test user-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/user-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn clean test -B

  # ─── Backend: Market Service ───────────────────────────────────
  test-market-service:
    name: Test market-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/market-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn clean test -B

  # ─── Backend: Order Service ────────────────────────────────────
  test-order-service:
    name: Test order-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/order-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn clean test -B

  # ─── Backend: API Gateway ──────────────────────────────────────
  test-api-gateway:
    name: Test api-gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn clean test -B

  # ─── Frontend: Angular ────────────────────────────────────────
  test-frontend:
    name: Test Angular frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run Angular tests (headless)
        run: npm test -- --watch=false --browsers=ChromeHeadless || true

  # ─── Docker Build Validation ───────────────────────────────────
  docker-build:
    name: Validate Docker builds
    runs-on: ubuntu-latest
    needs:
      - test-user-service
      - test-market-service
      - test-order-service
      - test-api-gateway
      - test-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
