# ── CI / Test profile ─────────────────────────────────────────────
# Uses H2 in-memory DB instead of PostgreSQL and disables external
# services so the Spring context starts without Docker in CI.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable RabbitMQ autoconfiguration (no broker in CI)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Internal service URLs
services.market-service.url=http://localhost:8081
services.user-service.url=http://localhost:8080

# Observability
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
