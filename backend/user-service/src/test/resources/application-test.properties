# ── CI / Test profile ─────────────────────────────────────────────
# Uses H2 in-memory DB instead of PostgreSQL so the Spring context
# starts without Docker in CI.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Redis autoconfiguration (no Redis in CI)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT (any valid 32+ char secret works for tests)
jwt.secret=CI-Test-Secret-Key-That-Is-At-Least-32-Characters
jwt.expiration-ms=86400000

# Observability
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
