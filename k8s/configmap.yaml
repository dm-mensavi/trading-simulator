apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-config
  namespace: trading-sim
data:
  # ── Database ─────────────────────────────────────────────────────
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/trading_db"
  SPRING_DATASOURCE_USERNAME: "admin"

  # ── Redis ────────────────────────────────────────────────────────
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"

  # ── RabbitMQ ─────────────────────────────────────────────────────
  SPRING_RABBITMQ_HOST: "rabbitmq"
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_USERNAME: "guest"

  # ── Internal service URLs (direct, bypasses gateway) ─────────────
  SERVICES_USER_SERVICE_URL: "http://user-service:8080"
  SERVICES_MARKET_SERVICE_URL: "http://market-service:8081"
  SERVICES_ORDER_SERVICE_URL: "http://order-service:8082"

  # ── JWT ──────────────────────────────────────────────────────────
  JWT_EXPIRATION_MS: "86400000"

  # ── Observability Probes ─────────────────────────────────────────
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"

