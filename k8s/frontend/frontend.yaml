apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: trading-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/dm-mensavi/trading-simulator-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: trading-sim
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      # NodePort for Docker Desktop / minikube (access via localhost:30080)
      nodePort: 30080
  type: NodePort
