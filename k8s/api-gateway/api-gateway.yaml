apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: trading-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: trading-simulator-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: trading-config
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: trading-sim
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      # NodePort for direct API access during local dev (http://localhost:30000/api/...)
      nodePort: 30000
  type: NodePort
