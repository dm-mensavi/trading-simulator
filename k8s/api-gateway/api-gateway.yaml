apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: trading-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/dm-mensavi/trading-simulator-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: trading-config
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: trading-sim
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      # NodePort for direct API access during local dev (http://localhost:30000/api/...)
      nodePort: 30000
  type: NodePort
