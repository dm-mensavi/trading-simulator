apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: trading-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: trading-simulator-user-service:latest
          # Use IfNotPresent for local images (Docker Desktop / minikube)
          # Change to Always when pushing to a registry (GCR, ECR, ACR)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: trading-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: SPRING_RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trading-secrets
                  key: JWT_SECRET
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: trading-sim
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
