<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon-wrap">
        <span class="logo-emoji">💠</span>
      </div>
      <span class="logo-text">TradeSim</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </span>
      <span>Dashboard</span>
    </a>
    <a routerLink="/portfolio" routerLinkActive="active" class="nav-link">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
      </span>
      <span>Portfolio</span>
    </a>
    <a routerLink="/trade" routerLinkActive="active" class="nav-link">
      <span class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </span>
      <span>Trade</span>
    </a>
  </nav>

  <div class="sidebar-spacer"></div>

  <!-- User Profile — clickable, navigates to /profile -->
  <div class="sidebar-footer" *ngIf="user">
    <a routerLink="/profile" class="user-profile-link">
      <div class="user-avatar">{{ initials }}</div>
      <div class="user-info">
        <span class="user-name">{{ user.fullName }}</span>
        <span class="user-email">{{ user.email }}</span>
      </div>
      <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>
    <button class="logout-icon-btn" (click)="logout()" title="Sign out">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</aside>
